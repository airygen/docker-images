name: Universal Release Image

on:
  release:
    types: [published]

jobs:
  parse:
    runs-on: ubuntu-latest
    outputs:
      image_type: ${{ steps.parse.outputs.image_type }}
      image_dir: ${{ steps.parse.outputs.image_dir }}
      image_tag: ${{ steps.parse.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse Image Info
        id: parse
        run: |
          TAG="${{ github.event.release.tag_name }}"
          IMAGE_NAME_PART=$(echo $TAG | sed -E 's/-[0-9]+\.[0-9]+\.[0-9]+$//')
          IFS='-' read -ra PARTS <<< "$IMAGE_NAME_PART"
          IMAGE_TYPE="${PARTS[0]}"
          IMAGE_DIR=$(echo $IMAGE_NAME_PART | tr '-' '/')
          IMAGE_TAG=$(echo $TAG | sed "s/^${IMAGE_TYPE}-//")
          echo "image_type=$IMAGE_TYPE" >> $GITHUB_OUTPUT
          echo "image_dir=$IMAGE_DIR" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Parsed image type: $IMAGE_TYPE"
          echo "Parsed image directory: $IMAGE_DIR"
          echo "Parsed image tag: $IMAGE_TAG"

  build-amd64:
    needs: parse
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push AMD64 Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ needs.parse.outputs.image_dir }}
          push: true
          provenance: false
          sbom: false
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.created=${{ github.event.release.created_at }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ needs.parse.outputs.image_type }}:${{ needs.parse.outputs.image_tag }}-amd64

  build-arm64:
    needs: parse
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push ARM64 Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ needs.parse.outputs.image_dir }}
          push: true
          provenance: false
          sbom: false
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.created=${{ github.event.release.created_at }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ needs.parse.outputs.image_type }}:${{ needs.parse.outputs.image_tag }}-arm64

  create-manifest:
    needs: [parse, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Multi-arch Manifest
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ needs.parse.outputs.image_type }}
          TAG: ${{ needs.parse.outputs.image_tag }}
        run: |
          echo "IMAGE=$IMAGE"
          echo "TAG=$TAG"

          docker buildx imagetools create -t $IMAGE:$TAG \
            $IMAGE:$TAG-amd64 \
            $IMAGE:$TAG-arm64
